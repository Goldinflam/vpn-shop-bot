[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["migrations", "alembic"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "B", "UP", "ASYNC", "S", "C4", "SIM", "RET"]
ignore = ["S101", "B008"]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S", "ASYNC"]

[tool.mypy]
python_version = "3.11"
strict = true
plugins = ["pydantic.mypy"]
exclude = ["migrations/", "alembic/", "build/", "dist/"]

[[tool.mypy.overrides]]
module = ["py3xui.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["shared", "xui_client", "backend", "bot"]
python_files = ["test_*.py"]
