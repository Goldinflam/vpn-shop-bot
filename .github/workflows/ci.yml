name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install packages
        run: |
          pip install -U pip
          pip install -e ./shared[dev]
          pip install -e ./xui_client[dev]
          pip install -e ./backend[dev]
          pip install -e ./bot[dev]

      - name: Ruff
        run: ruff check .

      - name: Mypy (shared)
        working-directory: shared
        run: mypy shared --strict

      - name: Mypy (xui_client)
        working-directory: xui_client
        run: mypy xui_client --strict

      - name: Mypy (backend)
        working-directory: backend
        run: mypy backend

      - name: Mypy (bot)
        working-directory: bot
        run: mypy bot --strict

      - name: Pytest
        run: pytest shared xui_client backend bot -v
